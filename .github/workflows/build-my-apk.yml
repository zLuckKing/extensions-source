name: Build MangaLivre APK (fork)

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions: {}

concurrency:
  group: build-mangalivre-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MangaLivre extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build MangaLivre (release, debug-signed since no keystore is present)
        run: |
          ./gradlew :src:pt:mangalivre:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mangalivre-apk
          path: |
            src/pt/mangalivre/build/outputs/apk/release/*.apk
          retention-days: 7
          if-no-files-found: error
